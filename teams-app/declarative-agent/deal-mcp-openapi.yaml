# Deal Room MCP — OpenAPI (Swagger 2.0) for the M365 Copilot declarative agent.
# Replace the placeholders below for your deployment. The OAuth client registration
# (reference_id in apiPlugin.json) is created in the Teams Developer Portal against
# your MCP app registration with scope api://<your-mcp-app-id>/deals.read.
swagger: '2.0'
info:
  title: Deal Room MCP
  description: >-
    Streamable MCP server exposing the fund's deals (list_deals, get_deal,
    search_deals) to Copilot, so a partner-MD agent can read live deal records —
    thesis, key figures, diligence workstreams, memo and compliance status, and
    top risks. Backed by the Deal Room backend; access is gated by Microsoft Entra ID.
  version: 1.0.0
host: <your-orchestrator-fqdn>
basePath: /
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /mcp:
    post:
      summary: Deal Room MCP server
      description: >-
        Streamable HTTP MCP endpoint. Tools: list_deals (all deals as summaries),
        get_deal (one deal as a bounded analyst view), search_deals (keyword
        search across company/sector/thesis).
      x-ms-agentic-protocol: mcp-streamable-1.0
      operationId: InvokeMCP
      responses:
        '200':
          description: Success
securityDefinitions:
  oauth2_auth:
    type: oauth2
    flow: accessCode
    authorizationUrl: https://login.microsoftonline.com/<your-tenant-id>/oauth2/v2.0/authorize
    tokenUrl: https://login.microsoftonline.com/<your-tenant-id>/oauth2/v2.0/token
    scopes:
      api://<your-mcp-app-id>/deals.read: Read the fund's deals
security:
  - oauth2_auth:
      - api://<your-mcp-app-id>/deals.read
